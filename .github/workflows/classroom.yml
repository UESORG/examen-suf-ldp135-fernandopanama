name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Validate commit
      id: validate-commit
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Validate commit
        setup-command: ''
        command: chmod +x ./.github/scripts/validate.sh && ./.github/scripts/validate.sh
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        VALIDATE-COMMIT_RESULTS: "${{steps.validate-commit.outputs.result}}"
      with:
        runners: validate-commit
